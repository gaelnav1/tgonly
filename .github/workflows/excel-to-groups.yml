name: Excel a groups.ts

on:
  push:
    paths:
      - 'data/tgonly-grupos.xlsx'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generar groups.ts desde Excel
        run: python scripts/excel_to_ts.py

      - name: Commit groups.ts actualizado
        run: |
          git config user.name "TGOnly Bot"
          git config user.email "bot@tgonly.com"
          git add data/groups.ts
          git diff --staged --quiet || git commit -m "chore: actualizar groups.ts desde Excel [skip ci]"
          git push
